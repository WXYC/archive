name: Charset Corpus Drift

# WX-1 M3.2 wiring. Calls the reusable workflow in @wxyc/shared to fail CI
# when the published charset-torture.json no longer matches our pinned hash.
# When the guard fails, response is one of:
#   1. Bump tests/fixtures/charset-torture.json.sha256 to the new SHA, re-run
#      the local round-trip suite (npm test), and PR.
#   2. Freeze the pin for one release with a `# corpus-pin-frozen reason: ...`
#      comment in the SHA file.
# See WXYC/wxyc-shared README "Drift guard CI" for the full procedure.

on:
  pull_request:
    paths:
      - "tests/fixtures/charset-torture.json.sha256"
      - ".github/workflows/charset-corpus-drift.yml"
  push:
    branches: [main]
  schedule:
    # Monday 08:17 UTC catches upstream bumps merged over the weekend.
    - cron: "17 8 * * 1"

jobs:
  drift:
    uses: WXYC/wxyc-shared/.github/workflows/check-charset-corpus-drift.yml@main
    with:
      pinned-sha256: 75a3395bb10894480dba95bf5b7f379f5056645098d6a1bf9e94416709e5214a
      package-version: "0.10.0"
    secrets:
      npm-token: ${{ secrets.GITHUB_TOKEN }}
